<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍢 축제 POS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@300;500;700&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF4500;
    --fire-light: #FF6B35;
    --mild: #FFB347;
    --dark: #1A1A1A;
    --card: #242424;
    --card2: #2E2E2E;
    --text: #F5F5F5;
    --muted: #888;
    --green: #4CAF50;
    --border: #3A3A3A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* ── 탭 네비 ── */
  .tab-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex;
    background: #111;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1; padding: 16px 0; font-size: 13px; font-weight: 700;
    background: none; border: none; color: var(--muted);
    cursor: pointer; letter-spacing: .5px;
    transition: color .2s;
    font-family: inherit;
  }
  .tab-btn.active { color: var(--fire); border-bottom: 2px solid var(--fire); }

  .page { display: none; padding-top: 58px; }
  .page.active { display: block; }

  /* ── 주문 화면 ── */
  .order-header {
    padding: 20px 16px 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .order-header h1 { font-size: 22px; font-weight: 900; }
  .fire-badge {
    background: linear-gradient(135deg, var(--fire), var(--mild));
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  }

  .menu-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; padding: 12px 16px;
  }
  .menu-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 12px;
    display: flex; flex-direction: column; gap: 10px;
    transition: border-color .15s, transform .1s;
    position: relative; overflow: hidden;
  }
  .menu-card.selected {
    border-color: var(--fire);
    background: #2A1A14;
  }
  .menu-card::before {
    content: attr(data-emoji);
    position: absolute; right: -4px; top: -4px;
    font-size: 48px; opacity: .12;
  }

  .menu-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
  .menu-price { font-size: 18px; font-weight: 900; color: var(--mild); }

  .qty-control {
    display: flex; align-items: center; gap: 0;
    background: #1A1A1A; border-radius: 10px; overflow: hidden;
  }
  .qty-btn {
    width: 36px; height: 36px; border: none;
    background: transparent; color: var(--text);
    font-size: 20px; cursor: pointer; font-weight: 300;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s;
    flex-shrink: 0;
  }
  .qty-btn:active { background: var(--border); }
  .qty-display {
    flex: 1; text-align: center; font-size: 18px; font-weight: 700;
    min-width: 0;
  }

  /* ── 주문 요약 바 ── */
  .order-summary {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #111;
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .summary-info { flex: 1; }
  .summary-total { font-size: 20px; font-weight: 900; }
  .summary-items { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .confirm-btn {
    background: linear-gradient(135deg, var(--fire), var(--fire-light));
    color: white; border: none;
    padding: 14px 24px; border-radius: 12px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: inherit;
    transition: opacity .15s, transform .1s;
    white-space: nowrap;
  }
  .confirm-btn:active { opacity: .85; transform: scale(.97); }
  .confirm-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── 현황 화면 ── */
  .dashboard { padding: 16px; padding-bottom: 20px; }
  .dashboard h2 { font-size: 20px; font-weight: 900; margin-bottom: 4px; }
  .dash-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 16px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 16px;
  }
  .stat-emoji { font-size: 36px; }
  .stat-info { flex: 1; }
  .stat-name { font-size: 14px; color: var(--muted); }
  .stat-qty {
    font-size: 36px; font-weight: 900;
    color: var(--fire); line-height: 1;
  }
  .stat-unit { font-size: 13px; color: var(--muted); }
  .stat-revenue { font-size: 13px; color: var(--mild); margin-top: 2px; }

  .total-box {
    background: linear-gradient(135deg, #2A1208, #1A1A1A);
    border: 1px solid var(--fire);
    border-radius: 16px; padding: 20px;
    margin-top: 8px; text-align: center;
  }
  .total-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .total-amount { font-size: 36px; font-weight: 900; color: var(--mild); }
  .total-count { font-size: 13px; color: var(--muted); margin-top: 4px; }

  .refresh-btn {
    width: 100%; margin-top: 16px;
    background: var(--card2); border: 1px solid var(--border);
    color: var(--text); padding: 14px;
    border-radius: 12px; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    transition: background .15s;
  }
  .refresh-btn:active { background: var(--border); }

  /* ── 토스트 ── */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--green); color: white;
    padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 700;
    opacity: 0; transition: all .3s;
    pointer-events: none; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: #c0392b; }

  /* ── 로딩 스피너 ── */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: white; border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .page-order { padding-bottom: 100px; }
</style>
</head>
<body>

<!-- 탭 네비 -->
<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('order')">🛒 주문 입력</button>
  <button class="tab-btn" onclick="switchTab('dashboard')">📊 판매 현황</button>
</nav>

<!-- ─── 주문 페이지 ─── -->
<div id="page-order" class="page page-order active">
  <div class="order-header">
    <h1>주문 입력</h1>
    <span class="fire-badge">🔥 OPEN</span>
  </div>

  <div class="menu-grid" id="menuGrid">
    <!-- JS로 생성 -->
  </div>
</div>

<!-- ─── 현황 페이지 ─── -->
<div id="page-dashboard" class="page">
  <div class="dashboard">
    <h2>📊 판매 현황</h2>
    <p class="dash-sub" id="lastUpdated">불러오는 중...</p>
    <div id="statCards"></div>
    <div class="total-box">
      <div class="total-label">총 매출</div>
      <div class="total-amount" id="totalRevenue">—</div>
      <div class="total-count" id="totalCount">—</div>
    </div>
    <button class="refresh-btn" onclick="loadDashboard()">↻ 새로고침</button>
  </div>
</div>

<!-- 주문 확정 바 -->
<div class="order-summary" id="orderSummary">
  <div class="summary-info">
    <div class="summary-total" id="summaryTotal">₩0</div>
    <div class="summary-items" id="summaryItems">메뉴를 선택하세요</div>
  </div>
  <button class="confirm-btn" id="confirmBtn" onclick="submitOrder()" disabled>
    주문 확정
  </button>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ── 서버에서 받은 메뉴 데이터 ──
const MENU = {{ menu | tojson }};

const EMOJI = {
  "닭꼬치 순한맛": "🍢",
  "닭꼬치 매운맛": "🔥",
  "소떡소떡":      "🌭",
  "음료":           "🧃",
};

const quantities = {};
Object.keys(MENU).forEach(k => quantities[k] = 0);

// ── 메뉴 카드 생성 ──
function buildMenuGrid() {
  const grid = document.getElementById("menuGrid");
  Object.entries(MENU).forEach(([name, price]) => {
    const card = document.createElement("div");
    card.className = "menu-card";
    card.dataset.emoji = EMOJI[name] || "🍽";
    card.id = `card-${name}`;
    card.innerHTML = `
      <div class="menu-name">${EMOJI[name] || ""} ${name}</div>
      <div class="menu-price">₩${price.toLocaleString()}</div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${name}', -1)">−</button>
        <span class="qty-display" id="qty-${name}">0</span>
        <button class="qty-btn" onclick="changeQty('${name}', 1)">+</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function changeQty(name, delta) {
  quantities[name] = Math.max(0, quantities[name] + delta);
  document.getElementById(`qty-${name}`).textContent = quantities[name];
  const card = document.getElementById(`card-${name}`);
  card.classList.toggle("selected", quantities[name] > 0);
  updateSummary();
}

function updateSummary() {
  let total = 0, items = [];
  Object.entries(quantities).forEach(([name, qty]) => {
    if (qty > 0) {
      total += MENU[name] * qty;
      items.push(`${name} ×${qty}`);
    }
  });
  document.getElementById("summaryTotal").textContent = `₩${total.toLocaleString()}`;
  document.getElementById("summaryItems").textContent =
    items.length ? items.join(" · ") : "메뉴를 선택하세요";
  document.getElementById("confirmBtn").disabled = items.length === 0;
}

async function submitOrder() {
  const btn = document.getElementById("confirmBtn");
  const payload = { ...quantities };
  const hasItems = Object.values(payload).some(v => v > 0);
  if (!hasItems) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>처리 중...';

  try {
    const res = await fetch("/api/order", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      showToast("✅ 주문 완료!");
      Object.keys(quantities).forEach(k => {
        quantities[k] = 0;
        document.getElementById(`qty-${k}`).textContent = 0;
        document.getElementById(`card-${k}`).classList.remove("selected");
      });
      updateSummary();
    } else {
      showToast("❌ " + (data.message || "오류 발생"), true);
    }
  } catch {
    showToast("❌ 서버 연결 실패", true);
  } finally {
    btn.innerHTML = "주문 확정";
    btn.disabled = false;
  }
}

// ── 대시보드 ──
async function loadDashboard() {
  document.getElementById("lastUpdated").textContent = "불러오는 중...";
  try {
    const res = await fetch("/api/summary");
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    const container = document.getElementById("statCards");
    container.innerHTML = "";
    let totalRev = 0, totalQty = 0;

    Object.entries(data.data).forEach(([name, qty]) => {
      const rev = qty * MENU[name];
      totalRev += rev; totalQty += qty;
      const card = document.createElement("div");
      card.className = "stat-card";
      card.innerHTML = `
        <div class="stat-emoji">${EMOJI[name] || "🍽"}</div>
        <div class="stat-info">
          <div class="stat-name">${name}</div>
          <div><span class="stat-qty">${qty}</span><span class="stat-unit"> 개</span></div>
          <div class="stat-revenue">₩${rev.toLocaleString()}</div>
        </div>
      `;
      container.appendChild(card);
    });

    document.getElementById("totalRevenue").textContent = `₩${totalRev.toLocaleString()}`;
    document.getElementById("totalCount").textContent = `총 ${totalQty}개 판매`;
    document.getElementById("lastUpdated").textContent =
      "마지막 업데이트: " + new Date().toLocaleTimeString("ko-KR");
  } catch (e) {
    document.getElementById("lastUpdated").textContent = "❌ 불러오기 실패: " + e.message;
  }
}

// ── 탭 전환 ──
function switchTab(tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`page-${tab}`).classList.add("active");
  event.currentTarget.classList.add("active");

  const summaryBar = document.getElementById("orderSummary");
  summaryBar.style.display = tab === "order" ? "flex" : "none";

  if (tab === "dashboard") loadDashboard();
}

function showToast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast" + (isError ? " error" : "");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── 초기화 ──
buildMenuGrid();
updateSummary();
</script>
</body>
</html>
