<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍢 축제 POS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF4500; --fire-light: #FF6B35; --mild: #FFB347;
    --dark: #1A1A1A; --card: #242424; --card2: #2E2E2E;
    --text: #F5F5F5; --muted: #888; --green: #4CAF50;
    --border: #3A3A3A; --red: #e74c3c;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--dark); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100dvh; }

  .tab-nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; background:#111; border-bottom:1px solid var(--border); }
  .tab-btn { flex:1; padding:14px 0; font-size:12px; font-weight:700; background:none; border:none; color:var(--muted); cursor:pointer; font-family:inherit; transition:color .2s; }
  .tab-btn.active { color:var(--fire); border-bottom:2px solid var(--fire); }

  .page { display:none; padding-top:54px; }
  .page.active { display:block; }

  /* 주문 */
  .order-header { padding:20px 16px 8px; display:flex; align-items:center; gap:10px; }
  .order-header h1 { font-size:22px; font-weight:900; }
  .fire-badge { background:linear-gradient(135deg,var(--fire),var(--mild)); padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }

  .menu-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:12px 16px; }
  .menu-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px 12px; display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden; transition:border-color .15s; }
  .menu-card.selected { border-color:var(--fire); background:#2A1A14; }
  .menu-card.soldout { opacity:.45; }
  .menu-card::before { content:attr(data-emoji); position:absolute; right:-4px; top:-4px; font-size:48px; opacity:.12; }
  .menu-name { font-size:14px; font-weight:700; line-height:1.3; }
  .menu-price { font-size:18px; font-weight:900; color:var(--mild); }
  .soldout-badge { display:inline-block; background:var(--red); color:white; font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; }

  .qty-control { display:flex; align-items:center; background:#1A1A1A; border-radius:10px; overflow:hidden; }
  .qty-btn { width:36px; height:36px; border:none; background:transparent; color:var(--text); font-size:20px; cursor:pointer; font-weight:300; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .qty-btn:active { background:var(--border); }
  .qty-btn:disabled { opacity:.3; cursor:not-allowed; }
  .qty-display { flex:1; text-align:center; font-size:18px; font-weight:700; }

  .order-summary { position:fixed; bottom:0; left:0; right:0; background:#111; border-top:1px solid var(--border); padding:12px 16px; display:flex; align-items:center; gap:12px; }
  .summary-info { flex:1; }
  .summary-total { font-size:20px; font-weight:900; }
  .summary-items { font-size:11px; color:var(--muted); margin-top:2px; }
  .confirm-btn { background:linear-gradient(135deg,var(--fire),var(--fire-light)); color:white; border:none; padding:14px 24px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .confirm-btn:active { opacity:.85; }
  .confirm-btn:disabled { opacity:.4; cursor:not-allowed; }

  /* 주문번호 팝업 */
  .order-popup { position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index:200; opacity:0; pointer-events:none; transition:opacity .3s; }
  .order-popup.show { opacity:1; pointer-events:all; }
  .popup-box { background:var(--card); border:2px solid var(--fire); border-radius:24px; padding:40px 32px; text-align:center; }
  .popup-label { font-size:14px; color:var(--muted); margin-bottom:8px; }
  .popup-no { font-size:72px; font-weight:900; color:var(--fire); line-height:1; }
  .popup-sub { font-size:14px; color:var(--muted); margin-top:12px; }
  .popup-close { margin-top:24px; background:var(--fire); color:white; border:none; padding:14px 40px; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; }

  /* 현황 */
  .dashboard { padding:16px; padding-bottom:20px; }
  .dashboard h2 { font-size:20px; font-weight:900; margin-bottom:4px; }
  .dash-sub { font-size:12px; color:var(--muted); margin-bottom:20px; }
  .stat-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px 16px; margin-bottom:12px; display:flex; align-items:center; gap:16px; }
  .stat-emoji { font-size:36px; }
  .stat-info { flex:1; }
  .stat-name { font-size:14px; color:var(--muted); }
  .stat-qty { font-size:36px; font-weight:900; color:var(--fire); line-height:1; }
  .stat-unit { font-size:13px; color:var(--muted); }
  .stat-revenue { font-size:13px; color:var(--mild); margin-top:2px; }
  .total-box { background:linear-gradient(135deg,#2A1208,#1A1A1A); border:1px solid var(--fire); border-radius:16px; padding:20px; margin-top:8px; text-align:center; }
  .total-label { font-size:12px; color:var(--muted); margin-bottom:6px; }
  .total-amount { font-size:36px; font-weight:900; color:var(--mild); }
  .total-count { font-size:13px; color:var(--muted); margin-top:4px; }
  .section-title { font-size:15px; font-weight:700; margin:24px 0 12px; }
  .order-list { display:flex; flex-direction:column; gap:8px; }
  .order-item { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:12px; }
  .order-item.done { opacity:.45; }
  .order-no-badge { background:var(--fire); color:white; font-size:13px; font-weight:900; padding:4px 10px; border-radius:8px; white-space:nowrap; }
  .order-no-badge.done { background:var(--muted); }
  .order-detail { flex:1; font-size:13px; color:var(--muted); line-height:1.6; }
  .order-total-sm { font-size:13px; font-weight:700; color:var(--mild); white-space:nowrap; }
  .order-time { font-size:11px; color:var(--muted); }
  .refresh-btn { width:100%; margin-top:16px; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:14px; border-radius:12px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }

  /* 관리자 */
  .admin-wrap { padding:16px; padding-bottom:32px; }
  .admin-wrap h2 { font-size:20px; font-weight:900; margin-bottom:4px; }
  .admin-sub { font-size:12px; color:var(--muted); margin-bottom:20px; }

  /* 잠금 화면 */
  .lock-screen { display:flex; flex-direction:column; align-items:center; padding:48px 16px; gap:16px; }
  .lock-icon { font-size:56px; }
  .lock-title { font-size:18px; font-weight:900; }
  .lock-input { width:100%; max-width:280px; background:var(--card2); border:1px solid var(--border); color:var(--text); padding:14px 16px; border-radius:12px; font-size:20px; font-family:inherit; text-align:center; letter-spacing:6px; }
  .lock-btn { width:100%; max-width:280px; background:var(--fire); color:white; border:none; padding:14px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .lock-err { font-size:13px; color:var(--red); min-height:18px; }

  /* 관리자 패널 */
  .admin-panel { display:none; }
  .admin-panel.show { display:block; }
  .admin-section { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:16px; margin-bottom:16px; }
  .admin-section-title { font-size:14px; font-weight:700; color:var(--muted); margin-bottom:14px; text-transform:uppercase; letter-spacing:.5px; }

  .menu-manage-row { display:flex; align-items:center; padding:12px 0; border-bottom:1px solid var(--border); gap:12px; }
  .menu-manage-row:last-child { border-bottom:none; }
  .mmr-info { flex:1; }
  .mmr-name { font-size:15px; font-weight:700; }
  .mmr-price { font-size:13px; color:var(--muted); }

  /* 토글 스위치 */
  .toggle-wrap { display:flex; align-items:center; gap:8px; }
  .toggle-label { font-size:12px; font-weight:700; color:var(--muted); }
  .toggle { position:relative; width:48px; height:26px; }
  .toggle input { opacity:0; width:0; height:0; }
  .toggle-slider { position:absolute; inset:0; background:#444; border-radius:26px; cursor:pointer; transition:.3s; }
  .toggle-slider:before { content:""; position:absolute; width:20px; height:20px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; }
  input:checked + .toggle-slider { background:var(--red); }
  input:checked + .toggle-slider:before { transform:translateX(22px); }

  /* 메뉴 추가 폼 */
  .add-form { display:flex; flex-direction:column; gap:10px; }
  .add-input { background:var(--card2); border:1px solid var(--border); color:var(--text); padding:12px 14px; border-radius:10px; font-size:15px; font-family:inherit; }
  .add-input::placeholder { color:var(--muted); }
  .add-btn { background:var(--green); color:white; border:none; padding:13px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
  .add-btn:active { opacity:.85; }

  .logout-btn { width:100%; background:transparent; border:1px solid var(--border); color:var(--muted); padding:12px; border-radius:10px; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:8px; }

  /* 토스트 */
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green); color:white; padding:12px 24px; border-radius:30px; font-size:14px; font-weight:700; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; z-index:999; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.error { background:var(--red); }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:4px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .page-order { padding-bottom:100px; }
</style>
</head>
<body>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('order',this)">🛒 주문</button>
  <button class="tab-btn" onclick="switchTab('dashboard',this)">📊 현황</button>
  <button class="tab-btn" onclick="switchTab('admin',this)">⚙️ 관리</button>
</nav>

<!-- 주문 -->
<div id="page-order" class="page page-order active">
  <div class="order-header"><h1>주문 입력</h1><span class="fire-badge">🔥 OPEN</span></div>
  <div class="menu-grid" id="menuGrid"></div>
</div>

<!-- 현황 -->
<div id="page-dashboard" class="page">
  <div class="dashboard">
    <h2>📊 판매 현황</h2>
    <p class="dash-sub" id="lastUpdated">불러오는 중...</p>
    <div id="statCards"></div>
    <div class="total-box">
      <div class="total-label">총 매출</div>
      <div class="total-amount" id="totalRevenue">—</div>
      <div class="total-count" id="totalCount">—</div>
    </div>
    <div class="section-title">🧾 주문 내역</div>
    <div class="order-list" id="orderList"></div>
    <button class="refresh-btn" onclick="loadDashboard()">↻ 새로고침</button>
  </div>
</div>

<!-- 관리자 -->
<div id="page-admin" class="page">
  <div class="admin-wrap">
    <h2>⚙️ 관리자</h2>
    <p class="admin-sub">솔드아웃 설정 및 메뉴 추가</p>

    <!-- 잠금 -->
    <div class="lock-screen" id="lockScreen">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">관리자 인증</div>
      <input class="lock-input" type="password" id="pwInput" placeholder="••••" maxlength="10"
             onkeydown="if(event.key==='Enter') doLogin()">
      <div class="lock-err" id="lockErr"></div>
      <button class="lock-btn" onclick="doLogin()">확인</button>
    </div>

    <!-- 패널 -->
    <div class="admin-panel" id="adminPanel">

      <!-- 솔드아웃 관리 -->
      <div class="admin-section">
        <div class="admin-section-title">🚫 솔드아웃 관리</div>
        <div id="soldoutList"></div>
      </div>

      <!-- 메뉴 추가 -->
      <div class="admin-section">
        <div class="admin-section-title">➕ 메뉴 추가</div>
        <div class="add-form">
          <input class="add-input" id="newMenuName" type="text" placeholder="메뉴 이름">
          <input class="add-input" id="newMenuPrice" type="number" placeholder="가격 (원)" inputmode="numeric">
          <button class="add-btn" onclick="addMenu()">추가하기</button>
        </div>
      </div>

      <button class="logout-btn" onclick="doLogout()">🔓 로그아웃</button>
    </div>
  </div>
</div>

<!-- 주문 확정 바 -->
<div class="order-summary" id="orderSummary">
  <div class="summary-info">
    <div class="summary-total" id="summaryTotal">₩0</div>
    <div class="summary-items" id="summaryItems">메뉴를 선택하세요</div>
  </div>
  <button class="confirm-btn" id="confirmBtn" onclick="submitOrder()" disabled>주문 확정</button>
</div>

<!-- 주문번호 팝업 -->
<div class="order-popup" id="orderPopup">
  <div class="popup-box">
    <div class="popup-label">주문번호</div>
    <div class="popup-no" id="popupNo">—</div>
    <div class="popup-sub">주문이 접수되었습니다!</div>
    <button class="popup-close" onclick="closePopup()">확인</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const EMOJI = {"닭꼬치 순한맛":"🍢","닭꼬치 매운맛":"🔥","소떡소떡":"🌭","음료":"🧃"};
let currentMenus = [];
let quantities = {};
let adminPassword = null;

// ── 메뉴 로드 ──
async function loadMenus() {
  try {
    const res = await fetch("/api/menu");
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    currentMenus = data.menus;
    buildMenuGrid();
    if (adminPassword) buildSoldoutList();
  } catch(e) { showToast("메뉴 로드 실패: " + e.message, true); }
}

function buildMenuGrid() {
  const grid = document.getElementById("menuGrid");
  grid.innerHTML = "";
  quantities = {};
  currentMenus.forEach(m => {
    quantities[m.name] = 0;
    const card = document.createElement("div");
    card.className = "menu-card" + (m.soldout ? " soldout" : "");
    card.dataset.emoji = EMOJI[m.name] || "🍽";
    card.id = `card-${m.name}`;
    card.innerHTML = `
      <div class="menu-name">${EMOJI[m.name]||""} ${m.name}${m.soldout ? ' <span class="soldout-badge">SOLD OUT</span>' : ""}</div>
      <div class="menu-price">₩${m.price.toLocaleString()}</div>
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${m.name}',-1)" ${m.soldout?"disabled":""}>−</button>
        <span class="qty-display" id="qty-${m.name}">0</span>
        <button class="qty-btn" onclick="changeQty('${m.name}',1)" ${m.soldout?"disabled":""}>+</button>
      </div>`;
    grid.appendChild(card);
  });
  updateSummary();
}

function changeQty(name, delta) {
  quantities[name] = Math.max(0, (quantities[name]||0) + delta);
  document.getElementById(`qty-${name}`).textContent = quantities[name];
  document.getElementById(`card-${name}`).classList.toggle("selected", quantities[name] > 0);
  updateSummary();
}

function updateSummary() {
  const priceMap = Object.fromEntries(currentMenus.map(m => [m.name, m.price]));
  let total = 0, items = [];
  Object.entries(quantities).forEach(([name, qty]) => {
    if (qty > 0) { total += priceMap[name] * qty; items.push(`${name} ×${qty}`); }
  });
  document.getElementById("summaryTotal").textContent = `₩${total.toLocaleString()}`;
  document.getElementById("summaryItems").textContent = items.length ? items.join(" · ") : "메뉴를 선택하세요";
  document.getElementById("confirmBtn").disabled = items.length === 0;
}

async function submitOrder() {
  const btn = document.getElementById("confirmBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>처리 중...';
  try {
    const res = await fetch("/api/order", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({...quantities}) });
    const data = await res.json();
    if (data.success) {
      document.getElementById("popupNo").textContent = `#${data.order_no}`;
      document.getElementById("orderPopup").classList.add("show");
      Object.keys(quantities).forEach(k => {
        quantities[k] = 0;
        const el = document.getElementById(`qty-${k}`);
        if (el) el.textContent = 0;
        const card = document.getElementById(`card-${k}`);
        if (card) card.classList.remove("selected");
      });
      updateSummary();
    } else { showToast("❌ " + (data.message||"오류"), true); }
  } catch { showToast("❌ 서버 연결 실패", true); }
  finally { btn.innerHTML = "주문 확정"; btn.disabled = false; }
}

function closePopup() { document.getElementById("orderPopup").classList.remove("show"); }

// ── 현황 ──
async function loadDashboard() {
  document.getElementById("lastUpdated").textContent = "불러오는 중...";
  try {
    const res = await fetch("/api/summary");
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    const menus = data.menus;
    const container = document.getElementById("statCards");
    container.innerHTML = "";
    let totalRev = 0, totalQty = 0;
    menus.forEach(m => {
      const qty = data.data[m.name] || 0;
      const rev = qty * m.price;
      totalRev += rev; totalQty += qty;
      const card = document.createElement("div");
      card.className = "stat-card";
      card.innerHTML = `
        <div class="stat-emoji">${EMOJI[m.name]||"🍽"}</div>
        <div class="stat-info">
          <div class="stat-name">${m.name}${m.soldout?' <span style="color:var(--red);font-size:11px">SOLD OUT</span>':""}</div>
          <div><span class="stat-qty">${qty}</span><span class="stat-unit"> 개</span></div>
          <div class="stat-revenue">₩${rev.toLocaleString()}</div>
        </div>`;
      container.appendChild(card);
    });
    document.getElementById("totalRevenue").textContent = `₩${totalRev.toLocaleString()}`;
    document.getElementById("totalCount").textContent = `총 ${totalQty}개 판매`;
    const orderList = document.getElementById("orderList");
    orderList.innerHTML = "";
    if (!data.orders.length) {
      orderList.innerHTML = `<div style="color:var(--muted);font-size:13px;text-align:center;padding:20px">아직 주문이 없어요</div>`;
    }
    data.orders.forEach(o => {
      const done = o.status === "완료";
      const itemStr = Object.entries(o.items).map(([m,q])=>`${EMOJI[m]||""}${m} ×${q}`).join(", ");
      const timeStr = o.timestamp ? o.timestamp.split(" ")[1] : "";
      const el = document.createElement("div");
      el.className = `order-item${done?" done":""}`;
      el.innerHTML = `
        <div class="order-no-badge ${done?"done":""}">#${o.order_no}</div>
        <div class="order-detail"><div>${itemStr}</div><div class="order-time">${timeStr} · ${done?"✅ 완료":"⏳ 대기중"}</div></div>
        <div class="order-total-sm">₩${o.total.toLocaleString()}</div>`;
      orderList.appendChild(el);
    });
    document.getElementById("lastUpdated").textContent = "마지막 업데이트: " + new Date().toLocaleTimeString("ko-KR");
  } catch(e) { document.getElementById("lastUpdated").textContent = "❌ 실패: " + e.message; }
}

// ── 관리자 ──
async function doLogin() {
  const pw = document.getElementById("pwInput").value;
  const res = await fetch("/api/admin/login", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({password:pw}) });
  const data = await res.json();
  if (data.success) {
    adminPassword = pw;
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("adminPanel").classList.add("show");
    buildSoldoutList();
  } else {
    document.getElementById("lockErr").textContent = "❌ 비밀번호가 틀렸습니다";
    document.getElementById("pwInput").value = "";
  }
}

function doLogout() {
  adminPassword = null;
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("adminPanel").classList.remove("show");
  document.getElementById("pwInput").value = "";
  document.getElementById("lockErr").textContent = "";
}

function buildSoldoutList() {
  const list = document.getElementById("soldoutList");
  list.innerHTML = "";
  currentMenus.forEach(m => {
    const row = document.createElement("div");
    row.className = "menu-manage-row";
    const toggleId = `toggle-${m.name}`;
    row.innerHTML = `
      <div class="mmr-info">
        <div class="mmr-name">${EMOJI[m.name]||""} ${m.name}</div>
        <div class="mmr-price">₩${m.price.toLocaleString()}</div>
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label">${m.soldout?"SOLD OUT":"판매중"}</span>
        <label class="toggle">
          <input type="checkbox" id="${toggleId}" ${m.soldout?"checked":""} onchange="toggleSoldout('${m.name}', this.checked, this)">
          <span class="toggle-slider"></span>
        </label>
      </div>`;
    list.appendChild(row);
  });
}

async function toggleSoldout(name, soldout, checkbox) {
  checkbox.disabled = true;
  const label = checkbox.closest(".toggle-wrap").querySelector(".toggle-label");
  try {
    const res = await fetch("/api/admin/soldout", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({password: adminPassword, name, soldout})
    });
    const data = await res.json();
    if (data.success) {
      label.textContent = soldout ? "SOLD OUT" : "판매중";
      const m = currentMenus.find(x => x.name === name);
      if (m) m.soldout = soldout;
      buildMenuGrid();
      showToast(soldout ? `${name} 솔드아웃 처리` : `${name} 판매 재개`);
    } else {
      checkbox.checked = !soldout;
      showToast("❌ 오류: " + data.message, true);
    }
  } catch {
    checkbox.checked = !soldout;
    showToast("❌ 서버 연결 실패", true);
  }
  checkbox.disabled = false;
}

async function addMenu() {
  const name  = document.getElementById("newMenuName").value.trim();
  const price = parseInt(document.getElementById("newMenuPrice").value);
  if (!name || !price || price <= 0) { showToast("❌ 메뉴명과 가격을 입력해주세요", true); return; }
  try {
    const res = await fetch("/api/admin/menu/add", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({password: adminPassword, name, price})
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById("newMenuName").value = "";
      document.getElementById("newMenuPrice").value = "";
      showToast(`✅ ${name} 추가 완료!`);
      await loadMenus();
    } else { showToast("❌ " + data.message, true); }
  } catch { showToast("❌ 서버 연결 실패", true); }
}

// ── 탭 전환 ──
function switchTab(tab, btn) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`page-${tab}`).classList.add("active");
  btn.classList.add("active");
  document.getElementById("orderSummary").style.display = tab === "order" ? "flex" : "none";
  if (tab === "dashboard") loadDashboard();
}

function showToast(msg, isError=false) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast" + (isError?" error":"");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

loadMenus();
</script>
