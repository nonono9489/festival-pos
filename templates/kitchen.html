<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍳 주방 화면</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --dark: #0F1A0F;
    --card: #1A2A1A;
    --card2: #223322;
    --green: #2ECC71;
    --green-dark: #27AE60;
    --yellow: #F1C40F;
    --text: #F0FFF0;
    --muted: #7A9A7A;
    --border: #2A4A2A;
    --fire: #FF4500;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: var(--dark); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100dvh; }

  .header {
    background: #0A120A;
    border-bottom: 1px solid var(--border);
    padding: 16px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { font-size: 18px; font-weight: 900; }
  .badge-count {
    background: var(--fire); color: white;
    font-size: 12px; font-weight: 900;
    padding: 4px 12px; border-radius: 20px;
  }
  .badge-count.zero { background: var(--muted); }

  .refresh-bar {
    padding: 8px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .last-updated { font-size: 11px; color: var(--muted); }
  .auto-badge { font-size: 11px; color: var(--green); }

  .order-list { padding: 8px 16px 32px; display: flex; flex-direction: column; gap: 12px; }

  .order-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    animation: slideIn .3s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .card-header {
    background: var(--card2);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .order-no { font-size: 22px; font-weight: 900; color: var(--green); }
  .order-time { font-size: 12px; color: var(--muted); }
  .wait-badge {
    font-size: 11px; font-weight: 700;
    padding: 4px 10px; border-radius: 20px;
    background: rgba(241,196,15,.15);
    color: var(--yellow);
    border: 1px solid rgba(241,196,15,.3);
  }

  .card-body { padding: 16px; }
  .menu-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .menu-row:last-child { border-bottom: none; }
  .menu-row-name { font-size: 15px; font-weight: 700; }
  .menu-row-qty {
    font-size: 24px; font-weight: 900;
    color: var(--green);
    min-width: 48px; text-align: right;
  }

  .complete-btn {
    width: 100%; margin: 12px 16px 16px;
    width: calc(100% - 32px);
    background: linear-gradient(135deg, var(--green), var(--green-dark));
    color: white; border: none;
    padding: 16px; border-radius: 14px;
    font-size: 16px; font-weight: 900;
    cursor: pointer; font-family: inherit;
    transition: opacity .15s, transform .1s;
    letter-spacing: .5px;
  }
  .complete-btn:active { opacity: .85; transform: scale(.98); }
  .complete-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* 빈 화면 */
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 20px;
    color: var(--muted); text-align: center;
  }
  .empty-icon { font-size: 64px; margin-bottom: 16px; }
  .empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .empty-sub { font-size: 13px; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 4px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 완료 애니메이션 */
  .order-card.completing {
    animation: fadeOut .4s ease forwards;
  }
  @keyframes fadeOut { to { opacity: 0; transform: scale(.95); } }
</style>
</head>
<body>

<div class="header">
  <h1>🍳 주방 화면</h1>
  <span class="badge-count zero" id="pendingCount">대기 0건</span>
</div>

<div class="refresh-bar">
  <span class="last-updated" id="lastUpdated">불러오는 중...</span>
  <span class="auto-badge">🔄 5초 자동갱신</span>
</div>

<div class="order-list" id="orderList"></div>

<script>
const EMOJI = { "닭꼬치 순한맛": "🍢", "닭꼬치 매운맛": "🔥", "소떡소떡": "🌭", "음료": "🧃" };

async function loadOrders() {
  try {
    const res = await fetch("/api/kitchen");
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    const orders = data.orders;
    const list = document.getElementById("orderList");
    const countBadge = document.getElementById("pendingCount");

    countBadge.textContent = `대기 ${orders.length}건`;
    countBadge.className = `badge-count${orders.length === 0 ? " zero" : ""}`;

    list.innerHTML = "";

    if (orders.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">✅</div>
          <div class="empty-title">대기 중인 주문 없음</div>
          <div class="empty-sub">새 주문이 들어오면 여기에 표시돼요</div>
        </div>`;
    } else {
      orders.forEach(o => {
        const timeStr = o.timestamp ? o.timestamp.split(" ")[1] : "";
        const menuRows = Object.entries(o.items).map(([name, qty]) => `
          <div class="menu-row">
            <div class="menu-row-name">${EMOJI[name] || ""} ${name}</div>
            <div class="menu-row-qty">${qty}개</div>
          </div>`).join("");

        const card = document.createElement("div");
        card.className = "order-card";
        card.id = `order-${o.sheet_row}`;
        card.innerHTML = `
          <div class="card-header">
            <div>
              <div class="order-no">#${o.order_no}</div>
              <div class="order-time">${timeStr}</div>
            </div>
            <span class="wait-badge">⏳ 대기중</span>
          </div>
          <div class="card-body">${menuRows}</div>
          <button class="complete-btn" onclick="completeOrder(${o.sheet_row}, this)">
            ✅ 완료 처리
          </button>`;
        list.appendChild(card);
      });
    }

    document.getElementById("lastUpdated").textContent =
      "마지막 업데이트: " + new Date().toLocaleTimeString("ko-KR");
  } catch(e) {
    document.getElementById("lastUpdated").textContent = "❌ 오류: " + e.message;
  }
}

async function completeOrder(sheetRow, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>처리 중...';
  try {
    const res = await fetch("/api/complete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sheet_row: sheetRow }),
    });
    const data = await res.json();
    if (data.success) {
      const card = document.getElementById(`order-${sheetRow}`);
      card.classList.add("completing");
      setTimeout(() => loadOrders(), 400);
    } else {
      btn.disabled = false;
      btn.innerHTML = "✅ 완료 처리";
      alert("오류: " + data.message);
    }
  } catch {
    btn.disabled = false;
    btn.innerHTML = "✅ 완료 처리";
    alert("서버 연결 실패");
  }
}

// 초기 로드 + 5초 자동 갱신
loadOrders();
setInterval(loadOrders, 5000);
</script>
</body>
</html>
